<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conference View</title>
    <link rel="stylesheet" href="css/index.css" />
    <script src="js/index.js" defer></script>
</head>

<body>
    <main class="scene" aria-live="polite">
        <section class="center-logo-wrap" aria-label="Conference logo">
            <img class="conference-logo" src="images/logo.svg" alt="Conference logo" />
        </section>

        <div class="speaker-banner">
            <h1 id="speakerName">No active speaker</h1>
            <h2 id="speakerTitle"></h2>
        </div>
    </main>
</body>

</html>
